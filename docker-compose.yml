services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: build
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://testpilot:testpilot@postgres:5432/testpilot
      AWS_ENDPOINT_URL: http://localstack:4566
      SQS_QUEUE_URL: http://localstack:4566/000000000000/testpilot-jobs
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:15
    pull_policy: if_not_present
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: testpilot
      POSTGRES_PASSWORD: testpilot
      POSTGRES_DB: testpilot
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testpilot -d testpilot"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  localstack:
    image: localstack/localstack:3.0.0
    pull_policy: if_not_present
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,sqs
      DEFAULT_REGION: us-east-2
      LOCALSTACK_HOST: localstack
      EAGER_SERVICE_LOADING: 1
    volumes:
      - localstack-data:/var/lib/localstack
    restart: unless-stopped

volumes:
  postgres-data:
  localstack-data:
